name: Content frontmatter

on:
  pull_request:
    paths:
      - "docs/**"
      - "taxonomy/**"
      - "scripts/validate-content-frontmatter.*"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "taxonomy/**"
      - "scripts/validate-content-frontmatter.*"

permissions:
  contents: read

jobs:
  validate-frontmatter:
    name: Validate docs frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip downloads so pyyaml + jsonschema are not re-fetched on every run.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-frontmatter-v1
          restore-keys: |
            ${{ runner.os }}-pip-frontmatter-

      - name: Install validator dependencies
        run: pip install --quiet pyyaml jsonschema

      - name: Validate changed docs (PR)
        if: github.event_name == 'pull_request'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [[ -z "$BASE" ]]; then
            BASE="origin/main"
          fi
          python3 scripts/validate-content-frontmatter.py \
            --changed-only \
            --base-ref "$BASE" \
            --scope 'docs/**'

      # On push to main: validate all docs, not just the changed set.
      # Uses the shell wrapper which handles the full-repo scan.
      - name: Validate all docs (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mapfile -t FILES < <(find docs -type f \( -name '*.md' -o -name '*.mdx' \) | sort)
          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No markdown files found under docs/ — skipping."
            exit 0
          fi
          python3 scripts/validate-content-frontmatter.py "${FILES[@]}"
